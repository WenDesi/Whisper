syntax = "proto3";

option csharp_namespace = "WhisperDesk.Proto";

package whisperdesk;

service PipelineService {
  rpc StartSession(StartSessionRequest) returns (StartSessionResponse);
  rpc StopSession(StopSessionRequest) returns (StopSessionResponse);
  rpc AbortSession(AbortSessionRequest) returns (AbortSessionResponse);
  rpc GetState(GetStateRequest) returns (GetStateResponse);
  rpc GetRecordingWav(GetRecordingWavRequest) returns (GetRecordingWavResponse);
  rpc Subscribe(SubscribeRequest) returns (stream PipelineEvent);
  rpc CorrectLastResult(CorrectRequest) returns (CorrectResponse);
}

// Requests
message StartSessionRequest {
  string foreground_process = 1;
  string foreground_window_title = 2;
}
message StopSessionRequest {}
message AbortSessionRequest {}
message GetStateRequest {}
message GetRecordingWavRequest {}
message SubscribeRequest {}

// Correction
message CorrectRequest {
  string correction_transcript = 1;
}
message CorrectResponse {
  string corrected_text = 1;
}

// Responses
message StartSessionResponse {}

message StopSessionResponse {
  optional PipelineResultDto result = 1;
}

message AbortSessionResponse {}

message GetStateResponse {
  PipelineStateDto state = 1;
  optional string last_processed_text = 2;
  bool has_recording_data = 3;
}

message GetRecordingWavResponse {
  bytes wav_data = 1;
}

// DTOs
enum PipelineStateDto {
  IDLE = 0;
  LISTENING = 1;
  TRANSCRIBING = 2;
  POST_PROCESSING = 3;
  COMPLETED = 4;
  ERROR = 5;
}

message PipelineResultDto {
  string raw_transcript = 1;
  string processed_text = 2;
  int64 audio_duration_ticks = 3;
  int64 timestamp_ticks = 4;
  string language = 5;
  optional string source_file = 6;
}

message PipelineErrorDto {
  string stage = 1;
  string message = 2;
}

// Server-push events
message PipelineEvent {
  oneof event {
    StateChangedEvent state_changed = 1;
    PartialTranscriptEvent partial_transcript = 2;
    SessionCompletedEvent session_completed = 3;
    ErrorEvent error = 4;
  }
}

message StateChangedEvent {
  PipelineStateDto state = 1;
}

message PartialTranscriptEvent {
  string text = 1;
}

message SessionCompletedEvent {
  PipelineResultDto result = 1;
}

message ErrorEvent {
  PipelineErrorDto error = 1;
}

service DeviceService {
  rpc ListCaptureDevices(ListCaptureDevicesRequest) returns (ListCaptureDevicesResponse);
  rpc GetPeakVolume(GetPeakVolumeRequest) returns (GetPeakVolumeResponse);
  rpc StartMonitoring(StartMonitoringRequest) returns (StartMonitoringResponse);
  rpc StopMonitoring(StopMonitoringRequest) returns (StopMonitoringResponse);
  rpc SetActiveDevice(SetActiveDeviceRequest) returns (SetActiveDeviceResponse);
}

message ListCaptureDevicesRequest {}
message ListCaptureDevicesResponse { repeated CaptureDeviceDto devices = 1; }
message CaptureDeviceDto { string id = 1; string name = 2; bool is_default = 3; }
message GetPeakVolumeRequest { string device_id = 1; }
message GetPeakVolumeResponse { float peak = 1; }
message StartMonitoringRequest {}
message StartMonitoringResponse {}
message StopMonitoringRequest {}
message StopMonitoringResponse {}
message SetActiveDeviceRequest { string device_id = 1; }
message SetActiveDeviceResponse {}
